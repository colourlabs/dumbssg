<!DOCTYPE html>
<html>
  <head>
    <title>{{ title }} | {{ site_title }}</title>
    <link rel="stylesheet" href="/assets/styles.css">
  </head>
  <body>
    <nav><a href="/"><- home</a></nav>
    <article>
      <h1>{{ title }}</h1>
      <time>{{ date }}</time>
      <div class="tags">
        tags: 
        {% for tag in tags %}
          <span>{{ tag }}</span>{% if not loop.is_last %},{% endif %}
        {% endfor %}
      </div>
      <div class="content">{{ content }}</div>
    </article>
  </body>
</html>
